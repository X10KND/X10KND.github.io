<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Card Number</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Random Card Number</h1>
        <div class="input-section">
            <div class="input-group">
                <div class="input-label">
                    <label for="min">Minimum:</label>
                    <input type="number" id="min" placeholder="Enter min">
                </div>
                <div class="input-label">
                    <label for="max">Maximum:</label>
                    <input type="number" id="max" placeholder="Enter max">
                </div>
            </div>
        </div>
        <div class="output-section">
            <p>Your Oral and Practical Examination Card Number is</p>
            <h2 id="number-display">-</h2>
        </div>
        <div class="button-section">
            <button id="generate">Generate</button>
            <button id="reset" class="reset-button">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
